<!DOCTYPE html>
<html>
<head>
    <title>Test Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>Probando conexión a Supabase</h1>
    <button onclick="testConnection()">Probar conexión</button>
    <div id="resultado"></div>

    <script>
        // Las mismas claves que usas en index.html
    const SUPABASE_URL = 'https://eixzktrrtqrzzqqlaqxo.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_XcIH1w6kcZcP7HA8mXW-yg_402H1CVY';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        async function testConnection() {
            document.getElementById('resultado').innerHTML = 'Conectando...';
            try {
                const { data, error } = await supabase.from('users').select('count', { count: 'exact', head: true });
                if (error) {
                    document.getElementById('resultado').innerHTML = '❌ Error: ' + error.message;
                } else {
                    document.getElementById('resultado').innerHTML = '✅ Conexión exitosa! La base de datos responde.';
                }
            } catch (err) {
                document.getElementById('resultado').innerHTML = '❌ Excepción: ' + err.message;
            }
        }
    </script>
</body>
</html>
