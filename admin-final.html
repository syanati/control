<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - ورشتي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { background: linear-gradient(135deg, #f5f7fa 0%, #e9edf2 100%); min-height: 100vh; }
        
        .admin-login {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            display: flex; justify-content: center; align-items: center; z-index: 1000;
        }
        .admin-login-card {
            background: white; padding: 2rem; border-radius: 32px;
            width: 90%; max-width: 400px; text-align: center;
        }
        .admin-login-card i { font-size: 4rem; color: #10b981; margin-bottom: 1rem; }
        .admin-login-card input {
            width: 100%; padding: 14px; margin: 12px 0;
            border: 2px solid #e2e8f0; border-radius: 16px; font-size: 1rem;
        }
        .admin-login-card button {
            width: 100%; padding: 14px; background: #10b981; color: white;
            border: none; border-radius: 16px; font-weight: 600; cursor: pointer;
        }
        
        .admin-panel { display: none; max-width: 1400px; margin: 0 auto; padding: 1rem; }
        .header {
            background: white; border-radius: 24px; padding: 1rem 2rem; margin-bottom: 2rem;
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;
        }
        .header h1 span { color: #10b981; }
        
        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem; margin-bottom: 2rem;
        }
        .stat-card {
            background: white; padding: 1.5rem; border-radius: 24px; text-align: center;
        }
        .stat-card .value { font-size: 2rem; font-weight: 700; color: #10b981; }
        
        .section {
            background: white; border-radius: 24px; padding: 1.5rem; margin-bottom: 2rem;
        }
        .section h3 { margin-bottom: 1rem; color: #1e293b; }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: right; border-bottom: 1px solid #e2e8f0; }
        th { background: #f1f5f9; }
        button { background: #10b981; color: white; border: none; padding: 8px 16px;
                 border-radius: 12px; cursor: pointer; margin: 4px; }
        button.danger { background: #ef4444; }
        .search-box { margin-bottom: 1rem; padding: 10px; width: 100%; max-width: 300px; border-radius: 12px; border: 1px solid #e2e8f0; }
        .tabs { display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .tab-btn { background: #e2e8f0; color: #1e293b; padding: 10px 20px; border-radius: 12px; cursor: pointer; }
        .tab-btn.active { background: #10b981; color: white; }
        
        @media (max-width: 768px) {
            th, td { font-size: 0.75rem; padding: 8px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<div class="admin-login" id="adminLogin">
    <div class="admin-login-card">
        <i class="fas fa-lock"></i>
        <h2>لوحة التحكم</h2>
        <p>ورشتي - نظام صيانة السيارات</p>
        <input type="password" id="adminPassword" placeholder="كلمة المرور">
        <button id="loginBtn">دخول</button>
    </div>
</div>

<div class="admin-panel" id="adminPanel">
    <div class="header">
        <h1><i class="fas fa-chart-line"></i> لوحة تحكم <span>ورشتي</span></h1>
        <button id="logoutBtn" style="background:#ef4444"><i class="fas fa-sign-out-alt"></i> خروج</button>
    </div>

    <div class="stats-grid" id="statsGrid"></div>

    <div class="tabs">
        <div class="tab-btn active" data-tab="users">المستخدمين</div>
        <div class="tab-btn" data-tab="maintenances">الصيانات</div>
    </div>

    <div id="tabUsers" class="section">
        <h3><i class="fas fa-users"></i> إدارة المستخدمين</h3>
        <input type="text" id="searchUser" class="search-box" placeholder="بحث باسم المستخدم أو البريد...">
        <div style="overflow-x: auto;">
            <table style="width:100%">
                <thead>
                    <tr><th>ID</th><th>الاسم</th><th>البريد</th><th>الهاتف</th><th>السيارة</th><th>تاريخ التسجيل</th></tr>
                </thead>
                <tbody id="usersList"></tbody>
            </table>
        </div>
    </div>

    <div id="tabMaintenances" class="section" style="display:none;">
        <h3><i class="fas fa-tools"></i> جميع الصيانات</h3>
        <div style="overflow-x: auto;">
            <table style="width:100%">
                <thead>
                    <tr><th>ID</th><th>المستخدم</th><th>النوع</th><th>العدد (كم)</th><th>التكلفة (SAR)</th><th>التاريخ</th></tr>
                </thead>
                <tbody id="maintenancesList"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // ========== MISMA CONFIGURACIÓN QUE INDEX.HTML ==========
    const SUPABASE_URL = 'https://eixzktrrtqrzzqqlaqxo.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_XcIH1w6kcZcP7HA8mXW-yg_402H1CVY';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    const ADMIN_PASSWORD = 'admin123';
    let allUsers = [];
    let allMaintenances = [];
    
    // Elementos del DOM
    const loginDiv = document.getElementById('adminLogin');
    const panelDiv = document.getElementById('adminPanel');
    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    
    function showToast(msg) {
        let t = document.createElement('div');
        t.style.cssText = 'position:fixed; bottom:20px; right:20px; background:#10b981; color:white; padding:12px 24px; border-radius:12px; z-index:3000;';
        t.innerHTML = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }
    
    async function loadUsers() {
        try {
            const { data, error } = await supabaseClient.from('users').select('*').order('id');
            if (error) throw error;
            allUsers = data || [];
            const tbody = document.getElementById('usersList');
            const searchTerm = document.getElementById('searchUser')?.value.toLowerCase() || '';
            const filtered = allUsers.filter(u => 
                u.username.toLowerCase().includes(searchTerm) || 
                (u.email || '').toLowerCase().includes(searchTerm)
            );
            tbody.innerHTML = filtered.map(u => `
                <tr>
                    <td>${u.id}</td>
                    <td>${u.username}</td>
                    <td>${u.email || '-'}</td>
                    <td>${u.phone || '-'}</td>
                    <td>${u.vehicle_name || '-'}</td>
                    <td>${new Date(u.created_at).toLocaleDateString('ar-SA')}</td>
                </tr>
            `).join('');
        } catch(err) {
            console.error(err);
            showToast('خطأ في تحميل المستخدمين');
        }
    }
    
    async function loadMaintenances() {
        try {
            const { data, error } = await supabaseClient.from('maintenances').select('*, users(username)').order('date', { ascending: false }).limit(100);
            if (error) throw error;
            allMaintenances = data || [];
            const tbody = document.getElementById('maintenancesList');
            tbody.innerHTML = allMaintenances.map(m => `
                <tr>
                    <td>${m.id}</td>
                    <td>${m.users?.username || m.user_id}</td>
                    <td>${m.type}</td>
                    <td>${m.kilometers.toLocaleString()} km</td>
                    <td>${m.cost.toFixed(2)}</td>
                    <td>${new Date(m.date).toLocaleDateString('ar-SA')}</td>
                </tr>
            `).join('');
        } catch(err) {
            console.error(err);
            showToast('خطأ في تحميل الصيانات');
        }
    }
    
    async function loadStats() {
        try {
            const { count: usersCount, error: usersError } = await supabaseClient.from('users').select('*', { count: 'exact', head: true });
            const { count: maintCount, error: maintError } = await supabaseClient.from('maintenances').select('*', { count: 'exact', head: true });
            const { data: costData, error: costError } = await supabaseClient.from('maintenances').select('cost');
            const totalCost = (costData || []).reduce((s, m) => s + (m.cost || 0), 0);
            
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card"><i class="fas fa-users fa-2x"></i><h3>المستخدمين</h3><div class="value">${usersCount || 0}</div></div>
                <div class="stat-card"><i class="fas fa-tools fa-2x"></i><h3>الصيانات</h3><div class="value">${maintCount || 0}</div></div>
                <div class="stat-card"><i class="fas fa-coins fa-2x"></i><h3>إجمالي المصروفات</h3><div class="value">${totalCost.toFixed(0)} SAR</div></div>
            `;
        } catch(err) {
            console.error(err);
        }
    }
    
    async function loadAllData() {
        showToast('جاري تحميل البيانات...');
        await loadUsers();
        await loadMaintenances();
        await loadStats();
        showToast('تم تحميل البيانات بنجاح');
    }
    
    // Eventos
    loginBtn.onclick = () => {
        const pass = document.getElementById('adminPassword').value;
        if (pass === ADMIN_PASSWORD) {
            loginDiv.style.display = 'none';
            panelDiv.style.display = 'block';
            loadAllData();
        } else {
            alert("كلمة المرور غير صحيحة");
        }
    };
    
    logoutBtn.onclick = () => {
        loginDiv.style.display = 'flex';
        panelDiv.style.display = 'none';
        document.getElementById('adminPassword').value = '';
    };
    
    // Filtro de búsqueda
    document.getElementById('searchUser')?.addEventListener('keyup', () => loadUsers());
    
    // Tabs
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const tab = btn.getAttribute('data-tab');
            document.getElementById('tabUsers').style.display = tab === 'users' ? 'block' : 'none';
            document.getElementById('tabMaintenances').style.display = tab === 'maintenances' ? 'block' : 'none';
        };
    });
</script>
</body>
</html>
