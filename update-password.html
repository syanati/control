<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحديث كلمة المرور - ورشتي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Tajawal',sans-serif;}
        body{background:linear-gradient(135deg,#1e293b,#0f172a);min-height:100vh;display:flex;justify-content:center;align-items:center;}
        .container{background:white;padding:2rem;border-radius:32px;width:90%;max-width:400px;text-align:center;}
        input{width:100%;padding:14px;margin:12px 0;border:2px solid #e2e8f0;border-radius:16px;}
        button{width:100%;padding:14px;background:#10b981;color:white;border:none;border-radius:16px;font-weight:600;cursor:pointer;}
        .message{margin-top:1rem;font-size:0.8rem;color:#64748b;}
    </style>
</head>
<body>
<div class="container">
    <h2>تحديث كلمة المرور</h2>
    <p>أدخل كلمة المرور الجديدة</p>
    <input type="password" id="newPassword" placeholder="كلمة المرور الجديدة">
    <input type="password" id="confirmPassword" placeholder="تأكيد كلمة المرور">
    <button onclick="updatePassword()">تحديث</button>
    <div id="message" class="message"></div>
</div>

<script>
    const SUPABASE_URL = 'https://eixzktrrtqrzzqqlaqxo.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_XcIH1w6kcZcP7HA8mXW-yg_402H1CVY';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    async function updatePassword() {
        const newPass = document.getElementById('newPassword').value;
        const confirmPass = document.getElementById('confirmPassword').value;
        const msgDiv = document.getElementById('message');
        
        if (!newPass || !confirmPass) {
            msgDiv.innerHTML = "الرجاء إدخال كلمة المرور الجديدة";
            return;
        }
        
        if (newPass !== confirmPass) {
            msgDiv.innerHTML = "كلمة المرور غير متطابقة";
            return;
        }
        
        msgDiv.innerHTML = "جاري التحديث...";
        
        const { error } = await supabase.auth.updateUser({ password: newPass });
        
        if (error) {
            msgDiv.innerHTML = "خطأ: " + error.message;
        } else {
            msgDiv.innerHTML = "✅ تم تحديث كلمة المرور بنجاح. يمكنك الآن تسجيل الدخول";
            setTimeout(() => { window.location.href = "https://warchati.com"; }, 3000);
        }
    }
</script>
</body>
</html>
