<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحديث كلمة المرور - ورشتي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Tajawal',sans-serif;}
        body{background:linear-gradient(135deg,#1e293b,#0f172a);min-height:100vh;display:flex;justify-content:center;align-items:center;}
        .container{background:white;padding:2rem;border-radius:32px;width:90%;max-width:400px;text-align:center;}
        input{width:100%;padding:14px;margin:12px 0;border:2px solid #e2e8f0;border-radius:16px;font-size:1rem;}
        button{width:100%;padding:14px;background:#10b981;color:white;border:none;border-radius:16px;font-weight:600;cursor:pointer;}
        button:hover{background:#059669;}
        .message{margin-top:1rem;font-size:0.8rem;color:#64748b;}
        .error{color:#ef4444;}
        .success{color:#10b981;}
        .loading{display:inline-block;width:20px;height:20px;border:2px solid #e2e8f0;border-top-color:#10b981;border-radius:50%;animation:spin 0.6s linear infinite;vertical-align:middle;margin-left:8px;}
        @keyframes spin{to{transform:rotate(360deg);}}
    </style>
</head>
<body>
<div class="container">
    <h2>تحديث كلمة المرور</h2>
    <p>أدخل كلمة المرور الجديدة</p>
    <input type="password" id="newPassword" placeholder="كلمة المرور الجديدة">
    <input type="password" id="confirmPassword" placeholder="تأكيد كلمة المرور">
    <button id="updateBtn">تحديث</button>
    <div id="message" class="message"></div>
</div>

<script>
    // ========== SUPABASE CONFIGURATION ==========
    const SUPABASE_URL = 'https://eixzktrrtqrzzqqlaqxo.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_XcIH1w6kcZcP7HA8mXW-yg_402H1CVY';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    const messageDiv = document.getElementById('message');
    const updateBtn = document.getElementById('updateBtn');
    
    // Función para mostrar mensajes
    function showMessage(text, isError = false) {
        messageDiv.innerHTML = text;
        messageDiv.className = isError ? 'message error' : 'message success';
    }
    
    // Función para mostrar loading
    function setLoading(loading) {
        if (loading) {
            updateBtn.disabled = true;
            updateBtn.innerHTML = 'جاري التحديث... <span class="loading"></span>';
        } else {
            updateBtn.disabled = false;
            updateBtn.innerHTML = 'تحديث';
        }
    }
    
    // Capturar el token de acceso de la URL (hash fragment)
    // Ejemplo de URL: https://warchati.com/update-password.html#access_token=xxx&refresh_token=xxx&...
    function getAccessTokenFromHash() {
        const hash = window.location.hash.substring(1); // quitar el #
        const params = new URLSearchParams(hash);
        return params.get('access_token');
    }
    
    // También puede venir en query string (menos común pero por si acaso)
    function getAccessTokenFromQuery() {
        const params = new URLSearchParams(window.location.search);
        return params.get('access_token');
    }
    
    async function handlePasswordReset() {
        const newPass = document.getElementById('newPassword').value;
        const confirmPass = document.getElementById('confirmPassword').value;
        
        if (!newPass || !confirmPass) {
            showMessage("الرجاء إدخال كلمة المرور الجديدة", true);
            return;
        }
        
        if (newPass !== confirmPass) {
            showMessage("كلمة المرور غير متطابقة", true);
            return;
        }
        
        if (newPass.length < 6) {
            showMessage("كلمة المرور يجب أن تكون 6 أحرف على الأقل", true);
            return;
        }
        
        setLoading(true);
        
        // 1. Obtener el token de acceso desde la URL
        let accessToken = getAccessTokenFromHash();
        if (!accessToken) accessToken = getAccessTokenFromQuery();
        
        if (!accessToken) {
            showMessage("❌ رابط غير صالح أو منتهي الصلاحية. يرجى طلب رابط جديد.", true);
            setLoading(false);
            return;
        }
        
        // 2. Establecer la sesión manualmente con el token
        const { error: sessionError } = await supabase.auth.setSession({
            access_token: accessToken,
            refresh_token: '' // no tenemos refresh token aquí, pero basta con el access token
        });
        
        if (sessionError) {
            console.error("Error al establecer sesión:", sessionError);
            showMessage("❌ رابط غير صالح أو منتهي. يرجى solicitar un nuevo enlace.", true);
            setLoading(false);
            return;
        }
        
        // 3. Actualizar la contraseña del usuario autenticado
        const { error: updateError } = await supabase.auth.updateUser({
            password: newPass
        });
        
        setLoading(false);
        
        if (updateError) {
            console.error("Error al actualizar:", updateError);
            showMessage("❌ خطأ في تحديث كلمة المرور: " + updateError.message, true);
        } else {
            showMessage("✅ تم تحديث كلمة المرور بنجاح. سيتم نقلك إلى صفحة الدخول...");
            setTimeout(() => {
                window.location.href = "https://warchati.com";
            }, 3000);
        }
    }
    
    // Asignar evento al botón
    updateBtn.addEventListener('click', handlePasswordReset);
    
    // Opcional: Verificar si hay token en la URL al cargar la página
    window.addEventListener('load', () => {
        const token = getAccessTokenFromHash() || getAccessTokenFromQuery();
        if (!token) {
            showMessage("⚠️ رابط غير صالح. يرجى استخدام الرابط الذي تلقيته في بريدك الإلكتروني.", true);
        } else {
            showMessage("الرابط صالح. أدخل كلمة المرور الجديدة.");
        }
    });
</script>
</body>
</html>
