<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحديث كلمة المرور - ورشتي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Tajawal',sans-serif;}
        body{background:linear-gradient(135deg,#1e293b,#0f172a);min-height:100vh;display:flex;justify-content:center;align-items:center;}
        .container{background:white;padding:2rem;border-radius:32px;width:90%;max-width:400px;text-align:center;}
        input{width:100%;padding:14px;margin:12px 0;border:2px solid #e2e8f0;border-radius:16px;font-size:1rem;}
        button{width:100%;padding:14px;background:#10b981;color:white;border:none;border-radius:16px;font-weight:600;cursor:pointer;}
        button:disabled{background:#94a3b8;cursor:not-allowed;}
        .message{margin-top:1rem;font-size:0.8rem;}
        .error{color:#ef4444;}
        .success{color:#10b981;}
    </style>
</head>
<body>
<div class="container">
    <h2>تحديث كلمة المرور</h2>
    <p>أدخل كلمة المرور الجديدة</p>
    <input type="password" id="newPassword" placeholder="كلمة المرور الجديدة">
    <input type="password" id="confirmPassword" placeholder="تأكيد كلمة المرور">
    <button id="updateBtn">تحديث</button>
    <div id="message" class="message"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // Esperar a que el DOM y el script de Supabase estén listos
    document.addEventListener('DOMContentLoaded', async () => {
        // Verificar que Supabase se cargó correctamente
        if (typeof window.supabase === 'undefined') {
            document.getElementById('message').innerHTML = '❌ Error al cargar la librería. Recarga la página.';
            document.getElementById('message').className = 'message error';
            return;
        }
        
        // Inicializar Supabase
        const supabase = window.supabase.createClient(
            'https://eixzktrrtqrzzqqlaqxo.supabase.co',
            'sb_publishable_XcIH1w6kcZcP7HA8mXW-yg_402H1CVY'
        );
        
        const messageDiv = document.getElementById('message');
        const updateBtn = document.getElementById('updateBtn');
        
        function showMessage(text, isError) {
            messageDiv.innerHTML = text;
            messageDiv.className = isError ? 'message error' : 'message success';
        }
        
        function setLoading(loading) {
            updateBtn.disabled = loading;
            updateBtn.innerHTML = loading ? 'جاري التحديث...' : 'تحديث';
        }
        
        // Verificar si hay sesión activa (el enlace de Supabase ya debería haberla creado)
        try {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                showMessage('✅ Sesión válida. Introduce tu nueva contraseña.', false);
            } else {
                showMessage('⚠️ No hay sesión activa. El enlace puede haber caducado. Solicita uno nuevo.', true);
                updateBtn.disabled = true;
                return;
            }
        } catch (err) {
            showMessage('❌ Error al verificar la sesión: ' + err.message, true);
            updateBtn.disabled = true;
            return;
        }
        
        // Actualizar contraseña
        updateBtn.addEventListener('click', async () => {
            const newPass = document.getElementById('newPassword').value;
            const confirmPass = document.getElementById('confirmPassword').value;
            
            if (!newPass || !confirmPass) {
                showMessage('⚠️ الرجاء إدخال كلمة المرور', true);
                return;
            }
            if (newPass !== confirmPass) {
                showMessage('⚠️ كلمة المرور غير متطابقة', true);
                return;
            }
            if (newPass.length < 6) {
                showMessage('⚠️ كلمة المرور يجب أن تكون 6 أحرف على الأقل', true);
                return;
            }
            
            setLoading(true);
            showMessage('جاري التحديث...', false);
            
            const { error: updateError } = await supabase.auth.updateUser({
                password: newPass
            });
            
            setLoading(false);
            
            if (updateError) {
                showMessage('❌ ' + updateError.message, true);
            } else {
                showMessage('✅ تم تحديث كلمة المرور بنجاح. جاري التحويل...', false);
                setTimeout(() => {
                    window.location.href = 'https://warchati.com';
                }, 3000);
            }
        });
    });
</script>
</body>
</html>
