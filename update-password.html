<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحديث كلمة المرور - ورشتي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Tajawal',sans-serif;}
        body{background:linear-gradient(135deg,#1e293b,#0f172a);min-height:100vh;display:flex;justify-content:center;align-items:center;}
        .container{background:white;padding:2rem;border-radius:32px;width:90%;max-width:400px;text-align:center;}
        input{width:100%;padding:14px;margin:12px 0;border:2px solid #e2e8f0;border-radius:16px;font-size:1rem;}
        button{width:100%;padding:14px;background:#10b981;color:white;border:none;border-radius:16px;font-weight:600;cursor:pointer;}
        .message{margin-top:1rem;font-size:0.8rem;}
        .error{color:#ef4444;}
        .success{color:#10b981;}
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="container">
    <h2>تحديث كلمة المرور</h2>
    <p>أدخل كلمة المرور الجديدة</p>
    <input type="password" id="newPassword" placeholder="كلمة المرور الجديدة">
    <input type="password" id="confirmPassword" placeholder="تأكيد كلمة المرور">
    <button id="updateBtn">تحديث</button>
    <div id="message" class="message"></div>
</div>

<script>
    // Supabase se inicializa en el scope global, SOLO UNA VEZ
    const SUPABASE_URL = 'https://eixzktrrtqrzzqqlaqxo.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_XcIH1w6kcZcP7HA8mXW-yg_402H1CVY';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    const messageDiv = document.getElementById('message');
    const updateBtn = document.getElementById('updateBtn');
    
    function showMessage(text, isError) {
        messageDiv.innerHTML = text;
        messageDiv.className = isError ? 'message error' : 'message success';
    }
    
    // Extraer el token de la URL (puede venir en query string o en hash)
    function getTokenFromUrl() {
        const urlParams = new URLSearchParams(window.location.search);
        let token = urlParams.get('token');
        if (token) {
            console.log("✅ Token encontrado en query string");
            return token;
        }
        const hashParams = new URLSearchParams(window.location.hash.substring(1));
        token = hashParams.get('access_token');
        if (token) {
            console.log("✅ Token encontrado en hash");
            return token;
        }
        console.log("❌ No se encontró token");
        return null;
    }
    
    updateBtn.addEventListener('click', async () => {
        const newPass = document.getElementById('newPassword').value;
        const confirmPass = document.getElementById('confirmPassword').value;
        
        if (!newPass || !confirmPass) {
            showMessage('⚠️ الرجاء إدخال كلمة المرور', true);
            return;
        }
        if (newPass !== confirmPass) {
            showMessage('⚠️ كلمة المرور غير متطابقة', true);
            return;
        }
        if (newPass.length < 6) {
            showMessage('⚠️ كلمة المرور يجب أن تكون 6 أحرف على الأقل', true);
            return;
        }
        
        showMessage('جاري التحديث...', false);
        updateBtn.disabled = true;
        
        const token = getTokenFromUrl();
        if (!token) {
            showMessage('❌ رابط غير صالح. Solicita un nuevo enlace.', true);
            updateBtn.disabled = false;
            return;
        }
        
        // Verificar si ya hay sesión activa
        const { data: { session }, error: sessionCheckError } = await supabase.auth.getSession();
        
        if (sessionCheckError || !session) {
            // Intercambiar el token por una sesión
            const { error: verifyError } = await supabase.auth.verifyOtp({
                token_hash: token,
                type: 'recovery'
            });
            
            if (verifyError) {
                showMessage('❌ ' + verifyError.message, true);
                updateBtn.disabled = false;
                return;
            }
        }
        
        // Actualizar la contraseña
        const { error: updateError } = await supabase.auth.updateUser({
            password: newPass
        });
        
        updateBtn.disabled = false;
        
        if (updateError) {
            showMessage('❌ ' + updateError.message, true);
        } else {
            showMessage('✅ تم تحديث كلمة المرور بنجاح. جاري التحويل...', false);
            setTimeout(() => {
                window.location.href = 'https://warchati.com';
            }, 3000);
        }
    });
    
    window.addEventListener('load', () => {
        const token = getTokenFromUrl();
        if (!token) {
            showMessage('⚠️ رابط غير صالح. Usa el enlace del correo.', true);
        } else {
            showMessage('✅ Enlace válido. Introduce tu nueva contraseña.', false);
        }
    });
</script>
</body>
</html>
