<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحديث كلمة المرور - ورشتي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Tajawal',sans-serif;}
        body{background:linear-gradient(135deg,#1e293b,#0f172a);min-height:100vh;display:flex;justify-content:center;align-items:center;}
        .container{background:white;padding:2rem;border-radius:32px;width:90%;max-width:400px;text-align:center;}
        input{width:100%;padding:14px;margin:12px 0;border:2px solid #e2e8f0;border-radius:16px;font-size:1rem;}
        button{width:100%;padding:14px;background:#10b981;color:white;border:none;border-radius:16px;font-weight:600;cursor:pointer;}
        .message{margin-top:1rem;font-size:0.8rem;}
        .error{color:#ef4444;}
        .success{color:#10b981;}
        .debug{font-size:0.7rem;color:#64748b;margin-top:1rem;word-break:break-all;}
    </style>
</head>
<body>
<div class="container">
    <h2>تحديث كلمة المرور</h2>
    <p>أدخل كلمة المرور الجديدة</p>
    <input type="password" id="newPassword" placeholder="كلمة المرور الجديدة">
    <input type="password" id="confirmPassword" placeholder="تأكيد كلمة المرور">
    <button id="updateBtn">تحديث</button>
    <div id="message" class="message"></div>
    <div id="debug" class="debug"></div>
</div>

<script>
    // ========== SUPABASE ==========
    const SUPABASE_URL = 'https://eixzktrrtqrzzqqlaqxo.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_XcIH1w6kcZcP7HA8mXW-yg_402H1CVY';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    const messageDiv = document.getElementById('message');
    const debugDiv = document.getElementById('debug');
    const updateBtn = document.getElementById('updateBtn');
    
    function showMessage(text, isError) {
        messageDiv.innerHTML = text;
        messageDiv.className = isError ? 'message error' : 'message success';
    }
    
    function showDebug(text) {
        debugDiv.innerHTML = text;
        console.log("[DEBUG]", text);
    }
    
    // Obtener token de la URL
    function getTokenFromUrl() {
        // Primero probar desde hash (#)
        let hash = window.location.hash.substring(1);
        if (hash) {
            let params = new URLSearchParams(hash);
            let token = params.get('access_token');
            if (token) {
                showDebug("✅ Token encontrado en hash");
                return token;
            }
        }
        // Probar desde query string (?)
        let search = window.location.search.substring(1);
        if (search) {
            let params = new URLSearchParams(search);
            let token = params.get('access_token');
            if (token) {
                showDebug("✅ Token encontrado en query string");
                return token;
            }
        }
        showDebug("❌ No se encontró token en la URL");
        return null;
    }
    
    updateBtn.addEventListener('click', async () => {
        const newPass = document.getElementById('newPassword').value;
        const confirmPass = document.getElementById('confirmPassword').value;
        
        showDebug("Botón clickeado");
        
        if (!newPass || !confirmPass) {
            showMessage('⚠️ الرجاء إدخال كلمة المرور', true);
            return;
        }
        if (newPass !== confirmPass) {
            showMessage('⚠️ كلمة المرور غير متطابقة', true);
            return;
        }
        if (newPass.length < 6) {
            showMessage('⚠️ 6 أحرف على الأقل', true);
            return;
        }
        
        showMessage('جاري التحديث...', false);
        updateBtn.disabled = true;
        
        const token = getTokenFromUrl();
        if (!token) {
            showMessage('❌ رابط غير صالح. Solicita un nuevo enlace.', true);
            updateBtn.disabled = false;
            return;
        }
        
        showDebug("Token: " + token.substring(0, 30) + "...");
        
        // Establecer sesión
        showDebug("Estableciendo sesión...");
        const { error: sessionError } = await supabase.auth.setSession({
            access_token: token,
            refresh_token: token
        });
        
        if (sessionError) {
            showDebug("Error sesión: " + sessionError.message);
            showMessage('❌ ' + sessionError.message, true);
            updateBtn.disabled = false;
            return;
        }
        
        showDebug("Sesión establecida, actualizando contraseña...");
        
        // Actualizar contraseña
        const { error: updateError } = await supabase.auth.updateUser({
            password: newPass
        });
        
        updateBtn.disabled = false;
        
        if (updateError) {
            showDebug("Error update: " + updateError.message);
            showMessage('❌ ' + updateError.message, true);
        } else {
            showDebug("✅ Contraseña actualizada con éxito");
            showMessage('✅ تم تحديث كلمة المرور بنجاح. جاري التحويل...', false);
            setTimeout(() => {
                window.location.href = 'https://warchati.com';
            }, 3000);
        }
    });
    
    // Al cargar la página
    window.addEventListener('load', () => {
        showDebug("Página cargada. URL: " + window.location.href);
        const token = getTokenFromUrl();
        if (!token) {
            showMessage('⚠️ Enlace sin token. Usa el enlace del correo.', true);
        } else {
            showMessage('✅ Enlace válido. Introduce tu nueva contraseña.', false);
        }
    });
</script>
</body>
</html>
