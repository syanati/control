<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - ورشتي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { background: linear-gradient(135deg, #f5f7fa 0%, #e9edf2 100%); min-height: 100vh; }
        
        /* Login del panel */
        .admin-login {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            display: flex; justify-content: center; align-items: center; z-index: 1000;
        }
        .admin-login-card {
            background: white; padding: 2rem; border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            width: 90%; max-width: 400px; text-align: center;
        }
        .admin-login-card i { font-size: 4rem; color: #10b981; margin-bottom: 1rem; }
        .admin-login-card input {
            width: 100%; padding: 14px; margin: 12px 0;
            border: 2px solid #e2e8f0; border-radius: 16px; font-size: 1rem;
        }
        .admin-login-card button {
            width: 100%; padding: 14px; background: #10b981; color: white;
            border: none; border-radius: 16px; font-weight: 600; cursor: pointer;
        }
        
        /* Panel principal */
        .admin-panel { display: none; max-width: 1400px; margin: 0 auto; padding: 1rem; }
        .header {
            background: white; border-radius: 24px; padding: 1rem 2rem; margin-bottom: 2rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;
        }
        .header h1 { color: #1e293b; }
        .header h1 span { color: #10b981; }
        
        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem; margin-bottom: 2rem;
        }
        .stat-card {
            background: white; padding: 1.5rem; border-radius: 24px; text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
        .stat-card .value { font-size: 2rem; font-weight: 700; color: #10b981; }
        
        .section {
            background: white; border-radius: 24px; padding: 1.5rem; margin-bottom: 2rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
        .section h3 { margin-bottom: 1rem; color: #1e293b; }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: right; border-bottom: 1px solid #e2e8f0; }
        th { background: #f1f5f9; }
        
        button { background: #10b981; color: white; border: none; padding: 8px 16px;
                 border-radius: 12px; cursor: pointer; margin: 4px; }
        button.danger { background: #ef4444; }
        button.warning { background: #f59e0b; }
        
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 2000;
        }
        .modal-content {
            background: white; padding: 2rem; border-radius: 24px; width: 90%; max-width: 500px;
        }
        .modal-content input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 12px; border: 1px solid #e2e8f0; }
        
        .tabs { display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .tab-btn { background: #e2e8f0; color: #1e293b; }
        .tab-btn.active { background: #10b981; color: white; }
        
        .search-box { margin-bottom: 1rem; padding: 10px; width: 100%; max-width: 300px; border-radius: 12px; border: 1px solid #e2e8f0; }
        
        @media (max-width: 768px) {
            th, td { font-size: 0.75rem; padding: 8px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<!-- Pantalla de login del panel -->
<div class="admin-login" id="adminLogin">
    <div class="admin-login-card">
        <i class="fas fa-lock"></i>
        <h2>لوحة التحكم</h2>
        <p>ورشتي - نظام صيانة السيارات</p>
        <input type="password" id="adminPassword" placeholder="كلمة المرور">
        <button onclick="checkAdminLogin()">دخول</button>
    </div>
</div>

<!-- Panel principal -->
<div class="admin-panel" id="adminPanel">
    <div class="header">
        <h1><i class="fas fa-chart-line"></i> لوحة تحكم <span>ورشتي</span></h1>
        <button onclick="logout()" style="background:#ef4444"><i class="fas fa-sign-out-alt"></i> خروج</button>
    </div>

    <!-- Estadísticas -->
    <div class="stats-grid" id="statsGrid"></div>

    <!-- Tabs -->
    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('users')"><i class="fas fa-users"></i> المستخدمين</button>
        <button class="tab-btn" onclick="showTab('maintenances')"><i class="fas fa-tools"></i> الصيانات</button>
        <button class="tab-btn" onclick="showTab('types')"><i class="fas fa-cog"></i> أنواع الصيانة</button>
    </div>

    <!-- Sección Usuarios -->
    <div id="tabUsers" class="section">
        <h3><i class="fas fa-users"></i> إدارة المستخدمين</h3>
        <input type="text" id="searchUser" class="search-box" placeholder="بحث باسم المستخدم أو البريد..." onkeyup="filterUsers()">
        <div style="overflow-x: auto;">
            <table id="usersTable">
                <thead>
                    <tr><th>ID</th><th>الاسم</th><th>البريد</th><th>الهاتف</th><th>السيارة</th><th>تاريخ التسجيل</th><th>إجراءات</th></tr>
                </thead>
                <tbody id="usersList"></tbody>
            </table>
        </div>
    </div>

    <!-- Sección Mantenimientos -->
    <div id="tabMaintenances" class="section" style="display:none;">
        <h3><i class="fas fa-tools"></i> جميع الصيانات</h3>
        <div style="overflow-x: auto;">
            <table id="maintenancesTable">
                <thead>
                    <tr><th>ID</th><th>المستخدم</th><th>النوع</th><th>العدد (كم)</th><th>التكلفة</th><th>التاريخ</th><th>الملاحظات</th></tr>
                </thead>
                <tbody id="maintenancesList"></tbody>
            </table>
        </div>
    </div>

    <!-- Sección Tipos de mantenimiento -->
    <div id="tabTypes" class="section" style="display:none;">
        <h3><i class="fas fa-cog"></i> أنواع الصيانة (للمستخدمين الجدد)</h3>
        <button onclick="openAddTypeModal()"><i class="fas fa-plus"></i> إضافة نوع جديد</button>
        <div style="overflow-x: auto; margin-top: 1rem;">
            <table id="typesTable">
                <thead><tr><th>نوع الصيانة</th><th>المسافة (كم)</th><th>إجراءات</th></tr></thead>
                <tbody id="typesList"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal para editar teléfono -->
<div id="phoneModal" class="modal">
    <div class="modal-content">
        <h3>تعديل رقم الهاتف</h3>
        <input type="tel" id="editPhone" placeholder="رقم الهاتف">
        <input type="hidden" id="editUserId">
        <button onclick="savePhone()">حفظ</button>
        <button onclick="closeModal('phoneModal')" style="background:#64748b">إلغاء</button>
    </div>
</div>

<!-- Modal para añadir/editar tipo -->
<div id="typeModal" class="modal">
    <div class="modal-content">
        <h3 id="typeModalTitle">إضافة نوع صيانة جديد</h3>
        <input type="text" id="typeName" placeholder="نوع الصيانة">
        <input type="number" id="typeFreq" placeholder="المسافة (كم)" value="10000">
        <input type="hidden" id="editTypeOld">
        <button onclick="saveType()">حفظ</button>
        <button onclick="closeModal('typeModal')" style="background:#64748b">إلغاء</button>
    </div>
</div>

<script>
    // ========== SUPABASE CONFIGURATION ==========
    const SUPABASE_URL = 'https://eixzktrrtqrzzqqlaqxo.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_XclH1w6kcZcP7HA8mXW-yg_402H1CVY';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    // Contraseña del panel (cámbiala por la que quieras)
    const ADMIN_PASSWORD = 'Hixam741';
    
    let allUsers = [];
    let allMaintenances = [];
    let defaultTypes = ["تغيير زيت", "فرامل", "إطارات", "سير المكينة", "بواجي", "فلتر هواء", "مياه ردياتير", "فحص عام"];
    let defaultFreqs = {
      "تغيير زيت": 10000, "فرامل": 100000, "إطارات": 60000,
       "سير المكينة": 100000, "بواجي": 30000, "فلتر هواء": 20000,
        "مياه ردياتير": 80000, "فحص عام": 15000
    };
    
    function checkAdminLogin() {
        const pass = document.getElementById('adminPassword').value;
        if (pass === ADMIN_PASSWORD) {
            document.getElementById('adminLogin').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            loadAllData();
        } else {
            alert("كلمة المرور غير صحيحة");
        }
    }
    
    function logout() {
        document.getElementById('adminLogin').style.display = 'flex';
        document.getElementById('adminPanel').style.display = 'none';
        document.getElementById('adminPassword').value = '';
    }
    
    async function loadAllData() {
        await loadUsers();
        await loadMaintenances();
        await loadStats();
        loadTypesTable();
    }
    
    async function loadUsers() {
        const { data, error } = await supabase.from('users').select('*').order('id');
        if (error) { console.error(error); return; }
        allUsers = data || [];
        renderUsersTable();
    }
    
    function renderUsersTable() {
        const tbody = document.getElementById('usersList');
        const searchTerm = document.getElementById('searchUser')?.value.toLowerCase() || '';
        const filtered = allUsers.filter(u => 
            u.username.toLowerCase().includes(searchTerm) || 
            (u.email || '').toLowerCase().includes(searchTerm)
        );
        
        tbody.innerHTML = filtered.map(u => `
            <tr>
                <td>${u.id}</td>
                <td>${u.username}</td>
                <td>${u.email || '-'}</td>
                <td>${u.phone || '-'}</td>
                <td>${u.vehicle_name || '-'}</td>
                <td>${new Date(u.created_at).toLocaleDateString('ar-SA')}</td>
                <td>
                    <button class="warning" onclick="openPhoneModal(${u.id}, '${u.phone || ''}')"><i class="fas fa-phone"></i> هاتف</button>
                    <button class="danger" onclick="deleteUser(${u.id})"><i class="fas fa-trash"></i> حذف</button>
                </td>
            </tr>
        `).join('');
    }
    
    function filterUsers() { renderUsersTable(); }
    
    function openPhoneModal(userId, currentPhone) {
        document.getElementById('editUserId').value = userId;
        document.getElementById('editPhone').value = currentPhone || '';
        document.getElementById('phoneModal').style.display = 'flex';
    }
    
    async function savePhone() {
        const userId = document.getElementById('editUserId').value;
        const phone = document.getElementById('editPhone').value;
        const { error } = await supabase.from('users').update({ phone: phone || null }).eq('id', userId);
        if (error) { alert("خطأ: " + error.message); return; }
        closeModal('phoneModal');
        loadUsers();
        showToast("تم تحديث رقم الهاتف");
    }
    
    async function deleteUser(userId) {
        if (!confirm('هل أنت متأكد من حذف هذا المستخدم؟ سيتم حذف جميع صياناته.')) return;
        await supabase.from('maintenances').delete().eq('user_id', userId);
        await supabase.from('frequencies').delete().eq('user_id', userId);
        await supabase.from('vehicles').delete().eq('user_id', userId);
        await supabase.from('users').delete().eq('id', userId);
        loadAllData();
        showToast("تم حذف المستخدم");
    }
    
    async function loadMaintenances() {
        const { data, error } = await supabase.from('maintenances').select('*, users(username)').order('date', { ascending: false });
        if (error) { console.error(error); return; }
        allMaintenances = data || [];
        renderMaintenancesTable();
    }
    
    function renderMaintenancesTable() {
        const tbody = document.getElementById('maintenancesList');
        tbody.innerHTML = allMaintenances.map(m => `
            <tr>
                <td>${m.id}</td>
                <td>${m.users?.username || m.user_id}</td>
                <td>${m.type}</td>
                <td>${m.kilometers.toLocaleString()} km</td>
                <td>${m.cost.toFixed(2)} SAR</td>
                <td>${new Date(m.date).toLocaleDateString('ar-SA')}</td>
                <td>${m.description || '-'}</td>
            </tr>
        `).join('');
    }
    
    async function loadStats() {
        const usersCount = allUsers.length;
        const maintenancesCount = allMaintenances.length;
        const totalCost = allMaintenances.reduce((s, m) => s + m.cost, 0);
        
        document.getElementById('statsGrid').innerHTML = `
            <div class="stat-card"><i class="fas fa-users fa-2x"></i><h3>المستخدمين</h3><div class="value">${usersCount}</div></div>
            <div class="stat-card"><i class="fas fa-tools fa-2x"></i><h3>الصيانات</h3><div class="value">${maintenancesCount}</div></div>
            <div class="stat-card"><i class="fas fa-coins fa-2x"></i><h3>إجمالي المصروفات</h3><div class="value">${totalCost.toFixed(0)} SAR</div></div>
        `;
    }
    
    function loadTypesTable() {
        const tbody = document.getElementById('typesList');
        tbody.innerHTML = Object.entries(defaultFreqs).map(([type, freq]) => `
            <tr>
                <td>${type}</td>
                <td>${freq.toLocaleString()} km</td>
                <td>
                    <button class="warning" onclick="editType('${type}')"><i class="fas fa-edit"></i> تعديل</button>
                    <button class="danger" onclick="deleteType('${type}')"><i class="fas fa-trash"></i> حذف</button>
                </td>
            </tr>
        `).join('');
    }
    
    function openAddTypeModal() {
        document.getElementById('typeModalTitle').innerText = 'إضافة نوع صيانة جديد';
        document.getElementById('typeName').value = '';
        document.getElementById('typeFreq').value = '10000';
        document.getElementById('editTypeOld').value = '';
        document.getElementById('typeModal').style.display = 'flex';
    }
    
    function editType(type) {
        document.getElementById('typeModalTitle').innerText = 'تعديل نوع الصيانة';
        document.getElementById('typeName').value = type;
        document.getElementById('typeFreq').value = defaultFreqs[type];
        document.getElementById('editTypeOld').value = type;
        document.getElementById('typeModal').style.display = 'flex';
    }
    
    async function saveType() {
        const newName = document.getElementById('typeName').value.trim();
        const freq = parseInt(document.getElementById('typeFreq').value);
        const oldName = document.getElementById('editTypeOld').value;
        
        if (!newName) { alert("الرجاء إدخال اسم نوع الصيانة"); return; }
        if (isNaN(freq) || freq <= 0) { alert("الرجاء إدخال مسافة صحيحة"); return; }
        
        if (oldName) {
            delete defaultFreqs[oldName];
            // Actualizar en la base de datos para usuarios existentes
            await supabase.from('frequencies').update({ maintenance_type: newName, frequency_km: freq }).eq('maintenance_type', oldName);
            await supabase.from('maintenances').update({ type: newName }).eq('type', oldName);
        }
        defaultFreqs[newName] = freq;
        
        closeModal('typeModal');
        loadTypesTable();
        // Guardar cambios en localStorage para nuevos usuarios
        localStorage.setItem('adminDefaultTypes', JSON.stringify(defaultFreqs));
        showToast("تم حفظ التغييرات");
    }
    
    async function deleteType(type) {
        if (!confirm('هل أنت متأكد من حذف نوع "' + type + '"؟')) return;
        delete defaultFreqs[type];
        await supabase.from('frequencies').delete().eq('maintenance_type', type);
        loadTypesTable();
        showToast("تم حذف النوع");
    }
    
    function showTab(tab) {
        document.getElementById('tabUsers').style.display = tab === 'users' ? 'block' : 'none';
        document.getElementById('tabMaintenances').style.display = tab === 'maintenances' ? 'block' : 'none';
        document.getElementById('tabTypes').style.display = tab === 'types' ? 'block' : 'none';
        
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
    }
    
    function closeModal(modalId) { document.getElementById(modalId).style.display = 'none'; }
    
    function showToast(msg) {
        let t = document.createElement('div');
        t.style.cssText = 'position:fixed; bottom:20px; right:20px; background:#10b981; color:white; padding:12px 24px; border-radius:12px; z-index:3000;';
        t.innerHTML = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }
    
    // Cerrar modal al hacer clic fuera
    window.onclick = function(e) {
        if (e.target.classList.contains('modal')) e.target.style.display = 'none';
    }
</script>
</body>
</html>
